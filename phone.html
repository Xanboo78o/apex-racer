<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0d10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Apex Racer — Phone Wheel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0b0d10; color: #f2f2f2; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  #app { min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; text-align: center; gap: 10px; overflow-y: auto; }
  /* Require landscape */
  #rotateNotice {
    display: none; position: fixed; inset: 0; z-index: 100;
    flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    background: #0b0d10; text-align: center; padding: 24px;
  }
  #rotateNotice .icon { font-size: 64px; animation: spin 2.2s ease-in-out infinite; }
  @keyframes spin { 0%,60%{transform:rotate(0)} 80%,100%{transform:rotate(90deg)} }
  @media (orientation: portrait) { #rotateNotice { display: flex; } #app { display: none; } }
  h1 { font-size: 30px; font-weight: 900; letter-spacing: 3px; }
  h1 span { color: #e23b2e; }
  .muted { opacity: .6; font-size: 14px; }
  input {
    font-size: 30px; font-weight: 800; letter-spacing: 8px; text-align: center; text-transform: uppercase;
    width: 100%; max-width: 320px; padding: 14px; border-radius: 12px; border: 2px solid #333;
    background: #14171c; color: #fff; outline: none;
  }
  input:focus { border-color: #2f6fe0; }
  button {
    font-family: inherit; font-size: 18px; font-weight: 700; cursor: pointer; color: #fff;
    background: #e23b2e; border: none; border-radius: 12px; padding: 15px 26px; width: 100%; max-width: 320px;
  }
  button.sec { background: #2b3038; font-size: 15px; padding: 12px; }
  button:active { transform: scale(.97); }
  .hidden { display: none !important; }
  #wheel { width: min(46vh, 300px); height: auto; transition: transform .05s linear; }
  #status { position: fixed; top: calc(12px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    z-index: 20; font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: 20px; background: rgba(20,24,30,.72); white-space: nowrap; }
  #status.ok { background: #16351f; color: #7ee59a; }
  #status.err { background: #3a1a1a; color: #f0a0a0; }
  .bar { width: 74vw; max-width: 340px; height: 10px; background: #1a1e24; border-radius: 5px; position: relative; overflow: hidden; }
  .bar .fill { position: absolute; top: 0; bottom: 0; left: 50%; background: #2f6fe0; width: 0; }
  .row { display: flex; gap: 10px; width: 74vw; max-width: 340px; }
  .row button { flex: 1; }
  .ctrl { width: 74vw; max-width: 340px; display: flex; flex-direction: column; gap: 6px; font-size: 13px; text-align: left; opacity: .85; }
  .ctrl label { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  input[type=range] { width: 60%; }
  select { background: #14171c; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 6px; font-size: 13px; }
  .seg { display: flex; gap: 6px; }
  .seg button { font-size: 13px; padding: 8px; background: #2b3038; }
  .seg button.active { background: #2f6fe0; }
  /* live HUD mirrored from the game — speedo bottom-left, minimap top-right */
  #pSpeedo {
    position: fixed; left: calc(14px + env(safe-area-inset-left)); bottom: calc(12px + env(safe-area-inset-bottom));
    z-index: 20; display: flex; align-items: baseline; gap: 4px; pointer-events: none;
    text-shadow: 0 2px 6px #000; font-variant-numeric: tabular-nums;
  }
  #pSpeed { font-size: 15vh; font-weight: 900; line-height: .9; color: #fff; }
  #pSpeedo small { font-size: 3.4vh; font-weight: 700; opacity: .7; }
  #pInfo {
    position: fixed; left: calc(16px + env(safe-area-inset-left)); top: calc(10px + env(safe-area-inset-top));
    z-index: 20; font-size: 3.4vh; font-weight: 800; color: #fff; text-shadow: 0 2px 6px #000; pointer-events: none;
  }
  #pInfo b { color: #e23b2e; }
  /* full-screen live town map */
  #townMap { position: fixed; inset: 0; z-index: 1; display: block; background: #0f151c; }
  #phoneSetBtn {
    position: fixed; top: calc(10px + env(safe-area-inset-top)); right: calc(12px + env(safe-area-inset-right));
    z-index: 30; width: 54px; height: 54px; min-width: 0; border-radius: 50%; padding: 0; font-size: 24px;
    background: rgba(20,24,30,.75); border: 1px solid #3a4350; color: #fff;
  }
  #phoneSettings {
    position: fixed; inset: 0; z-index: 50; background: rgba(8,10,13,.95); backdrop-filter: blur(5px);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 20px; overflow-y: auto;
  }
  #phoneSettings.hidden { display: none !important; }
  #phoneSettings h1 { font-size: 24px; margin-bottom: 2px; }
  #closeSetBtn { margin-top: 6px; }
  #fsBtn { background: #2b3038; }
  /* brake pad — big touch target, side chosen by the game */
  #brakeBtn {
    display: none; position: fixed; bottom: calc(20px + env(safe-area-inset-bottom));
    z-index: 25; width: 30vw; max-width: 200px; height: 34vh; max-height: 260px;
    border-radius: 20px; background: #7a1d18; border: 3px solid #e23b2e;
    font-size: 22px; font-weight: 900; letter-spacing: 2px; color: #fff; touch-action: none;
    display: none; align-items: center; justify-content: center;
  }
  #brakeBtn.on { display: flex; }
  #brakeBtn.left { left: calc(16px + env(safe-area-inset-left)); }
  #brakeBtn.right { right: calc(16px + env(safe-area-inset-right)); }
  #brakeBtn.pressed { background: #e23b2e; transform: scale(.97); }
</style>
</head>
<body>

<div id="rotateNotice">
  <div class="icon">📱</div>
  <h1>Turn sideways</h1>
  <p class="muted">Apex Wheel works in landscape. Rotate your phone to drive.</p>
</div>

<div id="app">

  <!-- Step 1: connect -->
  <div id="connectView">
    <h1>APEX<span>WHEEL</span></h1>
    <p class="muted">Enter the code shown on your game screen.</p>
    <input id="code" maxlength="6" placeholder="CODE" autocomplete="off" autocapitalize="characters" inputmode="text">
    <button id="connectBtn">Pair &amp; Enable Motion</button>
    <p class="muted" id="connErr"></p>
  </div>

  <!-- Step 2: driving — full-screen live map + minimal HUD; controls live in the ⚙ menu -->
  <div id="driveView" class="hidden">
    <canvas id="townMap"></canvas>
    <div id="pInfo"><span id="pPos">P1</span> &nbsp;·&nbsp; <span id="pLap">Lap 1</span></div>
    <div id="pSpeedo"><span id="pSpeed">0</span><small>km/h</small></div>
    <button id="brakeBtn">BRAKE</button>
    <button id="phoneSetBtn" aria-label="controls">⚙</button>
    <div id="status">Connecting…</div>

    <!-- controls settings menu -->
    <div id="phoneSettings" class="hidden">
      <h1>Controls</h1>
      <svg id="wheel" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="92" fill="none" stroke="#16181c" stroke-width="16"/>
        <circle cx="100" cy="100" r="92" fill="none" stroke="#2b2f36" stroke-width="12"/>
        <circle cx="100" cy="100" r="26" fill="#16181c" stroke="#2b2f36" stroke-width="4"/>
        <rect x="94" y="100" width="12" height="70" rx="4" fill="#2b2f36"/>
        <rect x="30" y="94" width="70" height="12" rx="4" fill="#2b2f36"/>
        <rect x="100" y="94" width="70" height="12" rx="4" fill="#2b2f36"/>
        <circle cx="100" cy="100" r="10" fill="#e23b2e"/>
        <rect x="86" y="16" width="28" height="14" rx="7" fill="#e23b2e"/>
      </svg>
      <div class="bar"><div class="fill" id="steerFill"></div></div>
      <div class="ctrl">
        <label>Sensitivity <input type="range" id="sens" min="10" max="70" value="28"></label>
        <label>Invert steering <input type="checkbox" id="invert"></label>
      </div>
      <button class="sec" id="calibBtn">Center / Calibrate</button>
      <button class="sec" id="fsBtn">⛶ Fullscreen</button>
      <button class="sec" id="discBtn">Disconnect</button>
      <button id="closeSetBtn">Done</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=1784654223"></script>
<script src="js/pembroke.js?v=1784654223"></script>
<script src="js/phone.js?v=1784654223"></script>
</body>
</html>
